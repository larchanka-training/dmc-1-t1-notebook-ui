name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    # paths фильтр убран — workflow всегда запускается на PR,
    # чтобы Required checks всегда отчитывались о результате.
    # Фильтрация кода vs документации выполняется внутри через job changes.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dmc-1-t1-notebook-ui

jobs:
  changes:
    name: Определить изменения
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.*'
              - 'tsconfig*.json'
              - 'Dockerfile'
              - 'nginx.conf'
              - '.github/workflows/**'

  lint:
    name: Lint (ESLint)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

  test:
    name: Test (vitest)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  notify-mono:
    name: Notify Mono to Update Submodules
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Dispatch submodule update to mono repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MONO_REPO_PAT }}
          repository: larchanka-training/dmc-1-t1-notebook-mono
          event-type: submodule-update
